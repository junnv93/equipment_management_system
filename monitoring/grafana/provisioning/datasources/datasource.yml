apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    url: http://prometheus:9090
    basicAuth: false
    isDefault: true
    editable: true
    
  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "*"
    isDefault: false
    jsonData:
      esVersion: 7.17.0
      timeField: "@timestamp"
      logMessageField: message
    basicAuth: false
    editable: true 