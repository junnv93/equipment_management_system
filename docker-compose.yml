services:
  postgres:
    image: postgres:15
    container_name: postgres_equipment
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: equipment_management
    ports:
      - '5433:5432' # 호스트 포트를 5433으로 변경하여 기존 PostgreSQL과 충돌 방지
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: redis_equipment
    restart: always
    ports:
      - '6380:6379' # 호스트 포트를 6380으로 변경하여 기존 Redis와 충돌 방지
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: equipment_management_backend
    build:
      context: .
      dockerfile: apps/backend/docker/Dockerfile
      target: development
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/equipment_management
      - REDIS_URL=redis://redis:6379
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
    ports:
      - '3001:3001'
      - '9229:9229' # 디버깅용 포트
    volumes:
      - ./apps/backend:/app/apps/backend
      - ./packages:/app/packages
      - backend_node_modules:/app/node_modules
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/docker/Dockerfile
      target: development
    container_name: equipment_management_frontend
    restart: always
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
    ports:
      - '3000:3000'
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - ./packages:/app/packages
      - frontend_node_modules:/app/node_modules
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  backend_node_modules:
