# 개발 환경용 Docker Compose
# PostgreSQL과 Redis만 Docker로 실행
# 백엔드/프론트엔드는 로컬에서 pnpm dev로 실행

services:
  postgres:
    image: postgres:15
    container_name: postgres_equipment
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: equipment_management
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: redis_equipment
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs_equipment
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - rustfs_data:/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9000/minio/health/live || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
