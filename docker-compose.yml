# Docker Compose — Dev entry point (include shim)
#
# 실제 서비스 정의는 infra/compose/{base,dev.override}.yml에 SSOT로 있다.
# 이 파일은 `pnpm dev` 및 `docker compose up` 편의를 위한 shim일 뿐.
#
# 새 서비스를 추가하려면 먼저 base.yml (공통) 또는 dev.override.yml (dev 전용)에 기술하고,
# 다른 환경 override도 함께 업데이트한다.
#
# 관련 문서:
#   - infra/compose/base.yml             (SSOT — postgres/redis/rustfs 공통)
#   - infra/compose/dev.override.yml     (dev: 포트 노출, ephemeral redis)
#   - docs/adr/0004-docker-compose-over-kubernetes.md
#   - docs/references/redis-persistence-matrix.md

name: equipment-management-system

include:
  - infra/compose/base.yml
  - infra/compose/dev.override.yml
