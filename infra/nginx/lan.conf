# 내부 LAN 전용 Nginx 설정
# HTTP만 사용 (HTTPS 불필요 - 내부 네트워크)

worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ─────────────────────────────────────────────
    # Rate Limiting 존 정의 (계층적 정책)
    # - global: 전체 IP당 기본 제한
    # - api: API 엔드포인트 강화 제한
    # - auth: 인증 엔드포인트 엄격 제한 (Brute-force 방지)
    # ─────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend {
        server backend:3001;
        keepalive 32;
    }

    # 로그 형식 정의 (구조화)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # 기본 성능 설정
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    server_tokens off;  # Nginx 버전 노출 방지

    # MIME 타입
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip 압축
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    server {
        listen 9000;
        server_name _;  # 모든 호스트명 허용 (내부망)

        # 클라이언트 실제 IP 전달
        real_ip_header X-Forwarded-For;
        set_real_ip_from 10.0.0.0/8;
        set_real_ip_from 172.16.0.0/12;
        set_real_ip_from 192.168.0.0/16;

        # ─────────────────────────────────────────────
        # 보안 헤더 (내부망이지만 기본 보호 적용)
        #
        # CSP: Next.js proxy.ts가 per-request nonce 주입 → pass-through.
        # Permissions-Policy: 정적 헤더 → Nginx(edge)가 SSOT. 업스트림 중복 방지.
        # LAN(HTTP) 특이사항:
        #   - getUserMedia는 Secure Context 필수 → LAN HTTP 환경에서는
        #     브라우저 수준 차단됨(localhost 예외). 사내 LAN 배포 시
        #     self-signed TLS 또는 사내 CA 발급 권장(별도 운영 가이드).
        # ─────────────────────────────────────────────
        proxy_hide_header Permissions-Policy;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

        # 전역 연결 제한(conn-level만 서버 레벨에 둠)
        # Rate limit(limit_req)은 location별로 선언 — nginx가 'off' 파라미터 미지원 → /health 제외 불가.
        limit_conn conn_limit 20;

        # ─────────────────────────────────────────────
        # Prometheus 메트릭 — 내부 모니터링 전용
        # ─────────────────────────────────────────────
        location /api/metrics {
            # 내부 Docker 네트워크에서만 접근 허용
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─────────────────────────────────────────────
        # 인증 엔드포인트 — 엄격한 Rate Limiting (Brute-force 방지)
        # ─────────────────────────────────────────────
        location ~ ^/api/auth/(login|signin|token|refresh) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_log_level warn;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ─────────────────────────────────────────────
        # SSE (Server-Sent Events) — timeout 해제
        # ─────────────────────────────────────────────
        location /api/notifications/stream {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;  # 24시간 (SSE 연결 유지)
            proxy_buffering off;
            proxy_cache off;
        }

        # ─────────────────────────────────────────────
        # API 요청 → Backend (일반 Rate Limiting)
        # ─────────────────────────────────────────────
        location /api {
            limit_req zone=api burst=30 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 버퍼 설정
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 32k;
        }

        # ─────────────────────────────────────────────
        # 나머지 모든 요청 → Frontend
        # ─────────────────────────────────────────────
        location / {
            limit_req zone=global burst=200 nodelay;
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Next.js 정적 자산 캐싱
            # 정적 자산은 CSP 불필요(실행 컨텍스트 없음). 보안 헤더는 상위 location에서 재선언(nginx 비상속).
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://frontend;
                proxy_set_header Host $host;
                expires 7d;
                add_header Cache-Control "public, immutable";
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;
                add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
            }
        }

        # Health check endpoint (Rate Limiting 제외)
        # server-level limit_req 제거 결과 /health에는 rate limit이 적용되지 않음(의도적).
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # 429 에러 페이지
        error_page 429 /429.html;
        location = /429.html {
            return 429 '{"error":"Too Many Requests","message":"요청 횟수를 초과했습니다. 잠시 후 다시 시도해주세요.","retryAfter":60}';
            add_header Content-Type application/json;
        }
    }
}
