global:
  resolve_timeout: 5m
  slack_api_url: '${SLACK_WEBHOOK}'

route:
  receiver: 'slack-warnings'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts: 즉시 전송, 반복 간격 1시간
    - receiver: 'slack-critical'
      match:
        severity: critical
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 1h
      continue: false

    # Warning alerts: 5분 그룹화
    - receiver: 'slack-warnings'
      match:
        severity: warning
      group_wait: 5m
      group_interval: 10m
      repeat_interval: 4h

receivers:
  # 텍스트 템플릿 메모:
  #   - description / summary: 모든 alert 가 보유 (필수)
  #   - runbook (multi-line): 운영자 즉시 행동 절차 — 보유 alert 만 노출 (`{{ if }}` 가드)
  #   - runbook_url: 상세 절차 링크 (`docs/operations/prometheus-alert-rules.md` anchor)
  #   신규 alert 추가 시 runbook + runbook_url 권고 — `docs/operations/prometheus-alert-rules.md` §Workflow 참조
  - name: 'slack-critical'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK}'
        channel: '#infra-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: >-
          *Severity:* {{ .CommonLabels.severity }}
          *Description:* {{ .CommonAnnotations.description }}
          *Details:*
          {{ range .Alerts }}
            - *{{ .Labels.instance }}*: {{ .Annotations.summary }}
            {{ if .Annotations.runbook }}*Runbook:*
          ```{{ .Annotations.runbook }}```{{ end }}
            {{ if .Annotations.runbook_url }}*Details:* <{{ .Annotations.runbook_url }}|운영 절차 문서>{{ end }}
          {{ end }}
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  - name: 'slack-warnings'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_WARNINGS}'
        channel: '#infra-warnings'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: >-
          *Severity:* {{ .CommonLabels.severity }}
          *Description:* {{ .CommonAnnotations.description }}
          *Details:*
          {{ range .Alerts }}
            - *{{ .Labels.instance }}*: {{ .Annotations.summary }}
            {{ if .Annotations.runbook }}*Runbook:*
          ```{{ .Annotations.runbook }}```{{ end }}
            {{ if .Annotations.runbook_url }}*Details:* <{{ .Annotations.runbook_url }}|운영 절차 문서>{{ end }}
          {{ end }}
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'

inhibit_rules:
  # critical이 발생하면 동일 alertname의 warning 억제
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
