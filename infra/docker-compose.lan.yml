# Docker Compose — LAN production entry point (include shim)
#
# 사내 LAN 단일 VM 배포 (nginx:9000 단일 포트).
# 실제 서비스 정의는 `compose/{base,lan.override}.yml`에 SSOT로 있다.
#
# 사용법:
#   docker compose -f infra/docker-compose.lan.yml up -d
#   docker compose -f infra/docker-compose.lan.yml --profile migration run --rm migration
#
# 관련 문서:
#   - compose/base.yml            (SSOT)
#   - compose/lan.override.yml    (LAN 전용: bind-mount, backend/frontend/nginx)
#   - docs/adr/0004-docker-compose-over-kubernetes.md
#   - DEPLOYMENT_LAN.md

name: equipment-management-system-lan

include:
  - compose/base.yml
  - compose/lan.override.yml
