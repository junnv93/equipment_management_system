# Production override (퍼블릭 인터넷 노출, Let's Encrypt, 풀 모니터링 스택)
#
# - postgres/redis/rustfs: named volumes (운영은 Docker volume driver 사용)
# - Redis AOF + requirepass
# - frontend/backend/nginx + certbot
# - 모니터링: prometheus/grafana/node-exporter/cadvisor/alertmanager/loki/promtail
# - 네트워크 세그멘테이션: app-network (internal) / web-public / monitoring-network (internal)
#
# Secret 주입 (ADR-0005 Accepted, Phase C 완료):
#   pnpm compose:prod 사용 → docker compose --env-file=/run/secrets/prod.env 로 실행
#   직접 실행 시: pnpm secrets:decrypt prod && docker compose --env-file=/run/secrets/prod.env -f base.yml -f prod.override.yml up -d
#   상세: ../secrets/README.md

# SYNC: base.yml x-security — YAML anchor는 파일 경계 불가, 동일 값 재정의
# 변경 시 base.yml · lan.override.yml 동시 업데이트 필수 (CI verify-compose-security.sh 검증)
x-security: &security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_DB: ${DB_NAME:-equipment_management}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 256m

  redis:
    restart: always
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - 'yes'
    volumes:
      - redis_data:/data
    networks:
      - data-network
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: '0.25'
        reservations:
          memory: 128m

  rustfs:
    restart: always
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY}
    volumes:
      - rustfs_data:/data
    networks:
      - data-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 256m

  frontend:
    <<: *security
    build:
      context: ../..
      dockerfile: apps/frontend/Dockerfile
      target: production
    restart: always
    stop_grace_period: 30s
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_BACKEND_URL=http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
      - web-public
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 512m
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  backend:
    <<: *security
    build:
      context: ../..
      dockerfile: apps/backend/docker/Dockerfile
      target: production
    restart: always
    stop_grace_period: 30s
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS=${REDIS_TLS:-false}
      - REDIS_TLS_REJECT_UNAUTHORIZED=${REDIS_TLS_REJECT_UNAUTHORIZED:-true}
      - CACHE_DRIVER=redis
      - DB_SSL=${DB_SSL:-false}
      - DB_SSL_REJECT_UNAUTHORIZED=${DB_SSL_REJECT_UNAUTHORIZED:-true}
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - PERMISSIONS_GUARD_MODE=${PERMISSIONS_GUARD_MODE:-DENY}
      - FRONTEND_URL=${FRONTEND_URL}
      - LOG_LEVEL=${LOG_LEVEL:-warn}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - STORAGE_DRIVER=s3
      - S3_ENDPOINT=http://rustfs:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-equipment-files}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    networks:
      - app-network
      - data-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/monitoring/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 512m
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  nginx:
    <<: *security
    image: nginx:1.27-alpine
    restart: always
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/certs:/etc/nginx/certs:ro
      - ../certbot/conf:/etc/letsencrypt:ro
      - ../certbot/www:/var/www/certbot:ro
    networks:
      - web-public
      - app-network
      - monitoring-network
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  certbot:
    <<: *security
    image: certbot/certbot
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ../certbot/conf:/etc/letsencrypt
      - ../certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - web-public
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  prometheus:
    <<: *security
    image: prom/prometheus:v2.55.1
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.listen-address=0.0.0.0:9090'
    networks:
      - app-network
      - monitoring-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  grafana:
    <<: *security
    image: grafana/grafana:11.4.0
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${FRONTEND_URL}/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_DISABLE_LOGIN_FORM=false
    networks:
      - monitoring-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  node-exporter:
    <<: *security
    image: prom/node-exporter:v1.8.2
    restart: always
    read_only: true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.1'
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  cadvisor:
    <<: *security
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    restart: always
    # read_only 예외: /var/run (rw) 마운트 필요 — cgroup/device 메트릭 수집에 쓰기 접근 사용
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  alertmanager:
    <<: *security
    image: prom/alertmanager:v0.28.0
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=0.0.0.0:9093'
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.1'
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  loki:
    <<: *security
    image: grafana/loki:2.9.4
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ../monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3100/ready || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
        reservations:
          memory: 128m
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  promtail:
    <<: *security
    image: grafana/promtail:2.9.4
    restart: always
    read_only: true
    volumes:
      - ../monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring-network
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.1'
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  migration:
    <<: *security
    build:
      context: ../..
      dockerfile: apps/backend/docker/Dockerfile
      target: production
    read_only: true
    tmpfs:
      - /tmp
    command: ['node', 'apps/backend/dist/database/run-migration.js']
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data-network
    restart: 'no'
    profiles:
      - migration

networks:
  # DB 계층 — postgres/redis/rustfs 격리, 인터넷 접근 차단
  data-network:
    internal: true
  # 앱 계층 — backend(SMTP 외부 발신), frontend, nginx
  # internal: false (기본값) — backend가 SMTP 릴레이 등 외부 서비스 호출 가능
  app-network:
  # 퍼블릭 계층 — nginx Let's Encrypt, certbot 갱신
  web-public:
  # 모니터링 계층 — prometheus/grafana/loki 등 격리
  monitoring-network:
    internal: true

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
