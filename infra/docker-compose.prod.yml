# Docker Compose — Public production entry point (include shim)
#
# 공개 프로덕션 — Let's Encrypt + 풀 모니터링 스택 (prometheus/grafana/loki/etc).
# 실제 서비스 정의는 `compose/{base,prod.override}.yml`에 SSOT로 있다.
#
# 사용법:
#   docker compose -f infra/docker-compose.prod.yml up -d
#   docker compose -f infra/docker-compose.prod.yml --profile migration run --rm migration
#
# 관련 문서:
#   - compose/base.yml            (SSOT)
#   - compose/prod.override.yml   (prod: 풀 스택 + 네트워크 세그멘테이션)
#   - docs/adr/0004-docker-compose-over-kubernetes.md

name: equipment-management-system-prod

include:
  - compose/base.yml
  - compose/prod.override.yml
