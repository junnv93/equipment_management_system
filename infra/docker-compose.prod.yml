services:
  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
      target: production
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_BACKEND_URL=http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
      - web-public
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 512m
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  backend:
    build:
      context: ..
      dockerfile: apps/backend/docker/Dockerfile
      target: production
    restart: always
    environment:
      - NODE_ENV=production
      # 하드코딩 제거: 모든 비밀 값은 .env 또는 환경변수에서 주입
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS=${REDIS_TLS:-false}
      - REDIS_TLS_REJECT_UNAUTHORIZED=${REDIS_TLS_REJECT_UNAUTHORIZED:-true}
      - CACHE_DRIVER=redis
      - DB_SSL=${DB_SSL:-false}
      - DB_SSL_REJECT_UNAUTHORIZED=${DB_SSL_REJECT_UNAUTHORIZED:-true}
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - PERMISSIONS_GUARD_MODE=${PERMISSIONS_GUARD_MODE:-DENY}
      - FRONTEND_URL=${FRONTEND_URL}
      - LOG_LEVEL=${LOG_LEVEL:-warn}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - STORAGE_DRIVER=s3
      - S3_ENDPOINT=http://rustfs:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-equipment-files}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/monitoring/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 512m
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  postgres:
    image: postgres:15.13-alpine # pinned 2026-04-14; 메이저 업그레이드 시 volume 데이터 비호환
    restart: always
    # SSL Configuration (optional — Docker internal network does not require SSL):
    # 1. Mount certificate files:
    #    volumes:
    #      - ./certs/server.crt:/var/lib/postgresql/server.crt:ro
    #      - ./certs/server.key:/var/lib/postgresql/server.key:ro
    # 2. Add to command: -c ssl=on -c ssl_cert_file=/var/lib/postgresql/server.crt -c ssl_key_file=/var/lib/postgresql/server.key
    # 3. Set DB_SSL=true in backend environment
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_DB: ${DB_NAME:-equipment_management}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 256m
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  redis:
    image: redis:7.4-alpine # pinned 2026-04-14
    restart: always
    # TLS Configuration (optional — Docker internal network does not require TLS):
    # 1. Mount certs and update command:
    #    command: redis-server --requirepass ${REDIS_PASSWORD} --tls-port 6379 --port 0
    #      --tls-cert-file /tls/redis.crt --tls-key-file /tls/redis.key --tls-ca-cert-file /tls/ca.crt
    # 2. Set REDIS_TLS=true and REDIS_URL=rediss://redis:6379 in backend environment
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: '0.25'
        reservations:
          memory: 128m
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  rustfs:
    image: rustfs/rustfs:latest # TODO: 공개 릴리즈 태그 확인 후 핀닝 — github.com/rustfs/rustfs/releases
    restart: always
    command: server /data --console-address ":9001"
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY}
    volumes:
      - rustfs_data:/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9000/minio/health/live || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 256m
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  nginx:
    image: nginx:1.27-alpine # pinned 2026-04-14
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - web-public
      - app-network
      - monitoring-network # Grafana 프록시를 위해
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    # Certbot 갱신 후 nginx reload (6시간 간격)
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - web-public
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ─────────────────────────────────────────────
  # 모니터링 — 포트를 외부에 직접 노출하지 않음
  # Prometheus/Grafana 접근은 Nginx 리버스 프록시를 통해서만
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1 # pinned 2026-04-14
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.listen-address=0.0.0.0:9090'
    # app-network: backend /api/metrics 스크래핑용
    # monitoring-network: node-exporter, cadvisor, Grafana 통신용
    networks:
      - app-network
      - monitoring-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  grafana:
    image: grafana/grafana:11.4.0 # pinned 2026-04-14; loki/promtail 2.9.4와 호환
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${FRONTEND_URL}/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      # 직접 포트 접근 비활성화 (Nginx 경유 강제)
      - GF_AUTH_DISABLE_LOGIN_FORM=false
    # 포트를 외부 노출하지 않음
    networks:
      - monitoring-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  node-exporter:
    image: prom/node-exporter:latest
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.1'
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  alertmanager:
    image: prom/alertmanager:latest
    restart: always
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=0.0.0.0:9093'
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.1'
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ─────────────────────────────────────────────
  # 로깅 — Loki + Promtail (ELK 대비 ~90% 메모리 절약)
  # Grafana에서 메트릭과 로그를 단일 UI로 조회
  # ─────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    restart: always
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3100/ready || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
        reservations:
          memory: 128m
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  promtail:
    image: grafana/promtail:2.9.4
    restart: always
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring-network
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.1'
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ─────────────────────────────────────────────
  # DB 마이그레이션 (one-shot, 배포 시에만 실행)
  # 사용법: docker compose --profile migration run --rm migration
  # ─────────────────────────────────────────────
  migration:
    build:
      context: ..
      dockerfile: apps/backend/docker/Dockerfile
      target: production
    command: ['node', 'apps/backend/dist/database/run-migration.js']
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: 'no'
    profiles:
      - migration

networks:
  # 내부 앱 통신 (외부 접근 불가)
  app-network:
    internal: true
  # 외부 접근 허용 (Nginx만 연결)
  web-public:
  # 모니터링 전용 내부 네트워크
  monitoring-network:
    internal: true

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
