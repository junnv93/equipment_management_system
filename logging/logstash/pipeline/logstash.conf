input {
  beats {
    port => 5044
  }
}

filter {
  if [container][image][name] =~ /equipment-management-backend/ {
    mutate {
      add_field => { "[@metadata][app]" => "backend" }
    }
    json {
      source => "message"
      target => "log_json"
      skip_on_invalid_json => true
    }
  }
  else if [container][image][name] =~ /equipment-management-frontend/ {
    mutate {
      add_field => { "[@metadata][app]" => "frontend" }
    }
  }
  else if [container][image][name] =~ /postgres/ {
    mutate {
      add_field => { "[@metadata][app]" => "postgres" }
    }
  }
  else if [container][image][name] =~ /redis/ {
    mutate {
      add_field => { "[@metadata][app]" => "redis" }
    }
  }
  else {
    mutate {
      add_field => { "[@metadata][app]" => "other" }
    }
  }

  # Add timestamp for all events
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
    remove_field => [ "timestamp" ]
    add_field => { "[@metadata][received_at]" => "%{@timestamp}" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][app]}-%{+YYYY.MM.dd}"
    document_type => "%{[@metadata][type]}"
  }
} 