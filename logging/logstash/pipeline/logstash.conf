input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Docker 컨테이너 로그 파싱
  if [container][name] {
    mutate {
      add_field => { "service" => "%{[container][name]}" }
    }
  }

  # JSON 로그 파싱 (NestJS 구조화 로그)
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "log_data"
    }
    if [log_data][level] {
      mutate {
        add_field => { "log_level" => "%{[log_data][level]}" }
      }
    }
  }

  # 타임스탬프 정규화
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }

  # 민감 정보 제거 (Authorization 헤더 등)
  mutate {
    remove_field => [ "[log_data][password]", "[log_data][token]", "[log_data][authorization]" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    # 서비스별 인덱스 분리 + 일자별 롤오버
    index => "equipment-mgmt-%{[service]}-%{+YYYY.MM.dd}"
    manage_template => false
  }
}
