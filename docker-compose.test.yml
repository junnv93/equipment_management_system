# E2E 테스트용 Docker Compose 설정
# 사용법: docker-compose -f docker-compose.test.yml up -d
# 테스트 DB 포트: 5434, 백엔드 포트: 3002

services:
  postgres-test:
    image: postgres:15
    container_name: postgres_equipment_test
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: equipment_management_test
    ports:
      - '5434:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - test-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:alpine
    container_name: redis_equipment_test
    restart: unless-stopped
    ports:
      - '6381:6379'
    volumes:
      - redis_test_data:/data
    networks:
      - test-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend-test:
    container_name: equipment_management_backend_test
    build:
      context: .
      dockerfile: apps/backend/docker/Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql://postgres:postgres@postgres-test:5432/equipment_management_test
      - REDIS_URL=redis://redis-test:6379
      - PORT=3001
      - FRONTEND_URL=http://localhost:3002
      - JWT_SECRET=test_jwt_secret_key
      - JWT_EXPIRATION=1d
    ports:
      - '3002:3001'
    volumes:
      - ./apps/backend:/app/apps/backend
      - ./packages:/app/packages
      - backend_test_node_modules:/app/node_modules
    networks:
      - test-network

networks:
  test-network:
    driver: bridge

volumes:
  postgres_test_data:
  redis_test_data:
  backend_test_node_modules:
