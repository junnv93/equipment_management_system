version: 2
updates:
  # npm dependencies (pnpm monorepo)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    # pnpm.overrides caret(^) 잠금 정책 보존 — dependabot이 caret을 >= 로 넓히지 못하도록
    versioning-strategy: 'auto'
    labels:
      - 'dependencies'
    groups:
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      # Major bumps require coordinated migration — don't auto-PR
      - dependency-name: '@nestjs/*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'jest'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/jest'
        update-types: ['version-update:semver-major']
      - dependency-name: 'ts-jest'
        update-types: ['version-update:semver-major']
      - dependency-name: '@typescript-eslint/*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'lucide-react'
        update-types: ['version-update:semver-major']
      # TypeScript 6 requires toolchain-wide migration (ts-jest, eslint, NestJS)
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      # uuid v10+ is ESM-only, incompatible with NestJS CommonJS build
      - dependency-name: 'uuid'
        update-types: ['version-update:semver-major']
      # @types/node must match runtime Node major (engines.node >=20)
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      # @types/express v5 breaks NestJS 10 (which uses express v4 runtime)
      - dependency-name: '@types/express'
        update-types: ['version-update:semver-major']
      # react-hook-form / resolvers major bumps need form-wide regression testing
      - dependency-name: 'react-hook-form'
        update-types: ['version-update:semver-major']
      - dependency-name: '@hookform/resolvers'
        update-types: ['version-update:semver-major']
      # recharts is currently unused — remove dependency before re-enabling
      - dependency-name: 'recharts'
        update-types: ['version-update:semver-major']
      # React 19 + Next.js 16 RSC runtime compatibility — App Router 16→17 별도 마이그레이션
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      # next-auth v5+ auth() API 변경 — session/JWT 호환성
      - dependency-name: 'next-auth'
        update-types: ['version-update:semver-major']
      # next-intl locale 라우팅 ABI 변경
      - dependency-name: 'next-intl'
        update-types: ['version-update:semver-major']
      # tailwindcss v4 ESM/Lightning CSS 마이그레이션 필요
      - dependency-name: 'tailwindcss'
        update-types: ['version-update:semver-major']
      # drizzle-orm/drizzle-kit 스키마/마이그레이션 형식 호환성 (baseline squash 정책)
      - dependency-name: 'drizzle-orm'
        update-types: ['version-update:semver-major']
      - dependency-name: 'drizzle-kit'
        update-types: ['version-update:semver-major']
      # zod v4 schema API 변경
      - dependency-name: 'zod'
        update-types: ['version-update:semver-major']
      # @playwright/test storageState/fixture 호환성
      - dependency-name: '@playwright/test'
        update-types: ['version-update:semver-major']
      # pg는 Drizzle 호환 매트릭스에 의존
      - dependency-name: 'pg'
        update-types: ['version-update:semver-major']
      # eslint v9+ flat config 마이그레이션 필요 (eslintrc→flat config ABI 파괴적 변경)
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      # prettier v4+ 포맷 규칙 변경 — PostToolUse hook 전체 리포맷 위험
      - dependency-name: 'prettier'
        update-types: ['version-update:semver-major']
      # @tanstack/react-query v6+ queryKey/queryFn/devtools ABI 파괴적 변경
      - dependency-name: '@tanstack/react-query'
        update-types: ['version-update:semver-major']
      - dependency-name: '@tanstack/react-query-devtools'
        update-types: ['version-update:semver-major']
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'wednesday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'ci'
    commit-message:
      prefix: 'ci'
      include: 'scope'

  # Docker base images
  - package-ecosystem: 'docker'
    directory: '/apps/backend/docker'
    schedule:
      interval: 'weekly'
      day: 'friday'
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'build'
      include: 'scope'

  - package-ecosystem: 'docker'
    directory: '/apps/frontend'
    schedule:
      interval: 'weekly'
      day: 'friday'
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'build'
      include: 'scope'

  # Infrastructure Docker images (postgres, redis, nginx, monitoring, rustfs)
  - package-ecosystem: 'docker'
    directory: '/infra/compose'
    schedule:
      interval: 'weekly'
      day: 'friday'
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'build'
      include: 'scope'

  - package-ecosystem: 'docker'
    directory: '/infra/rustfs'
    schedule:
      interval: 'weekly'
      day: 'friday'
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'build'
      include: 'scope'
