# E2E 테스트 — Nightly + 수동 트리거
#
# 업계 표준 패턴:
# - PR CI: Lint + TypeScript + Unit Tests (~5분, 빠른 피드백)
# - Nightly: E2E 전체 스위트 (매일 새벽, 회귀 탐지)
# - Pre-deploy: main merge 후 배포 전 E2E (선택)
#
# 수동 실행: Actions 탭 → "E2E Tests (Nightly)" → Run workflow

name: E2E Tests (Nightly)

on:
  schedule:
    # 매일 새벽 3시 KST (UTC 18:00)
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      project:
        description: 'Playwright project (chromium, firefox, or all)'
        required: false
        default: 'chromium'

concurrency:
  group: e2e-nightly
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  e2e:
    name: E2E Tests (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: equipment_management
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Backend (shared packages → backend)
        run: pnpm --filter backend... run build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Run DB Migrations & Seed
        run: pnpm --filter backend exec drizzle-kit push --force && pnpm --filter backend run db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equipment_management

      # Frontend는 dev 모드로 실행 (production build에서는 NODE_ENV=production 강제로
      # test-login provider가 비활성화되어 E2E 인증이 불가능하므로 dev 모드 사용)

      - name: Install Playwright Browsers
        run: pnpm --filter frontend exec playwright install --with-deps chromium

      - name: Start Backend
        run: pnpm --filter backend run start:prod &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equipment_management
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-jwt-secret-do-not-use-in-production' }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET || 'ci-refresh-secret-do-not-use-in-production' }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY || 'ci-internal-api-key-do-not-use-in-prod-32chars-minimum-required-here' }}
          NODE_ENV: test
          PERMISSIONS_GUARD_MODE: DENY
          FRONTEND_URL: http://localhost:3000
          PORT: 3001

      - name: Start Frontend (dev mode — required for test-login auth provider)
        run: pnpm --filter frontend exec next dev --port 3000 --turbopack &
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-nextauth-placeholder-32chars-min' }}
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Wait for services
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:3001/api/monitoring/health > /dev/null 2>&1 && echo "Backend ready" && break
            [ "$i" = "60" ] && echo "Backend failed" && exit 1
            sleep 2
          done
          for i in $(seq 1 120); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "Frontend ready" && break
            [ "$i" = "120" ] && echo "Frontend failed" && exit 1
            sleep 2
          done
          # Pre-warm: turbopack dev mode compiles pages on first request
          echo "Pre-warming login page..."
          curl -sf http://localhost:3000/login > /dev/null 2>&1 || true
          curl -sf http://localhost:3000/api/auth/providers > /dev/null 2>&1 || true
          sleep 3
          echo "Pre-warm complete"

      - name: Run E2E Tests
        run: pnpm --filter frontend exec playwright test --project=chromium --shard=${{ matrix.shard }}/4

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}-${{ github.run_id }}
          path: apps/frontend/playwright-report/
          retention-days: 14

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: deployments
          SLACK_TITLE: 'E2E Nightly Failed ❌'
          SLACK_MESSAGE: 'Nightly E2E tests failed. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          SLACK_COLOR: danger
