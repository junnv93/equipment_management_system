name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 같은 브랜치에 새 push가 오면 이전 실행 취소 (PR 피드백 속도 향상)
# main push는 취소하지 않음 — 배포 중단 방지
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ─────────────────────────────────────────────
  # Gate 1: 시크릿 스캔 (~30s, 독립 실행)
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # Gate 2: 품질 게이트 (~3-5min, DB 불필요)
  # Lint + TypeScript + 엔드포인트 어노테이션 검증
  # ─────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint — Backend (CI mode, no auto-fix)
        run: pnpm --filter backend run lint:ci

      - name: Lint — Frontend
        run: pnpm --filter frontend run lint

      - name: TypeScript — Backend
        run: pnpm --filter backend run type-check

      - name: TypeScript — Frontend
        run: pnpm --filter frontend run type-check

      - name: Security — Endpoint Annotation Check
        # 모든 컨트롤러 엔드포인트에 @RequirePermissions/@SkipPermissions/@Public 보장
        run: pnpm security:check

  # ─────────────────────────────────────────────
  # Gate 3a: 유닛 테스트 (quality-gate 후 병렬)
  # ─────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality-gate
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: equipment_management
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Shared Packages
        run: pnpm build --filter "@equipment-management/*"

      - name: Run DB Migrations
        run: pnpm --filter backend run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equipment_management

      - name: Run Unit Tests (with coverage)
        run: pnpm --filter backend run test:cov
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equipment_management
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-jwt-secret-do-not-use-in-production' }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET || 'ci-refresh-secret-do-not-use-in-production' }}
          NODE_ENV: test
          PERMISSIONS_GUARD_MODE: DENY

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/backend/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Gate 3b: 빌드 검증 (quality-gate 후 병렬)
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (turbo — 공유 패키지 → 백엔드 → 프론트엔드 순)
        run: pnpm build
        env:
          # Next.js 빌드 시 필요한 플레이스홀더 환경 변수
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-nextauth-placeholder-32chars-min' }}
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3001
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

  # ─────────────────────────────────────────────
  # Gate 3c: 의존성 보안 감사 (quality-gate 후 병렬)
  # ─────────────────────────────────────────────
  dep-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # --prod: 프로덕션 의존성만 검사 (devDependency 제외)
      # --audit-level=high: CVSS 7+ (High/Critical)만 빌드 실패 처리
      # pnpm.overrides에서 이미 미티게이션된 취약점은 통과
      - name: pnpm Audit (prod only, high+critical)
        run: pnpm audit --prod --audit-level=high

  # ─────────────────────────────────────────────
  # Gate 4: 스테이징 배포 (3개 게이트 모두 통과 후)
  # main push only
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy (Staging)
    runs-on: ubuntu-latest
    needs: [unit-test, build, dep-audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push images (staging tag)
        run: |
          echo "Building staging images for SHA ${{ github.sha }}"

      - name: Deploy to staging server
        if: ${{ secrets.STAGING_DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/equipment-management-staging
            chmod +x ./scripts/deploy/deploy.sh
            DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }} ./scripts/deploy/deploy.sh ${{ github.sha }}

      - name: Staging smoke test
        run: echo "Staging deployment completed for SHA ${{ github.sha }}"

  # ─────────────────────────────────────────────
  # Gate 5: 프로덕션 배포
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    needs: [unit-test, build, dep-audit, deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # 이미지 태그 전략: :latest + :<sha> (SHA로 특정 버전 롤백 가능)
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/equipment-management
            chmod +x ./scripts/deploy/deploy.sh
            DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }} ./scripts/deploy/deploy.sh ${{ github.sha }}

      - name: Send deployment notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: deployments
          SLACK_TITLE: ${{ job.status == 'success' && 'Deployment Completed ✅' || 'Deployment Failed ❌' }}
          SLACK_MESSAGE: |
            Equipment Management System
            Branch: ${{ github.ref_name }}
            SHA: ${{ github.sha }}
            Status: ${{ job.status }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
