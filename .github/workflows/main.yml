name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # 배포 파이프라인(docker-build → image-scan → deploy-*)은 수동 트리거로만 실행
  # 아직 배포 대상이 없는 단계라 매 main push마다 Docker Hub 푸시를 시도할 필요 없음
  workflow_dispatch:

# 같은 브랜치에 새 push가 오면 이전 실행 취소 (PR 피드백 속도 향상)
# main push는 취소하지 않음 — 배포 중단 방지
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: read
  security-events: write

env:
  NODE_VERSION: '20'
  HADOLINT_VERSION: 'v2.12.0'
  SOPS_VERSION: 'v3.9.4'

jobs:
  # ─────────────────────────────────────────────
  # Gate 1: 시크릿 스캔 (~30s, 독립 실행)
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # Gate 2: 품질 게이트 (~3-5min, DB 불필요)
  # Lint + TypeScript + 엔드포인트 어노테이션 검증
  # ─────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    # secret-scan과 병렬 실행 — 시크릿 스캔은 독립 게이트로, 코드 품질 파이프라인을 차단하지 않음
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # Turbo + node_modules 캐시
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: turbo-cache
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build Shared Packages
        run: pnpm build --filter "@equipment-management/*"

      - name: Upload Shared Package Dists
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: shared-packages-dist
          path: |
            packages/schemas/dist
            packages/shared-constants/dist
            packages/db/dist
          if-no-files-found: error
          retention-days: 1

      - name: Lint — Backend (CI mode, no auto-fix)
        run: pnpm --filter backend run lint:ci

      - name: Lint — Frontend
        run: pnpm --filter frontend run lint

      - name: TypeScript — Backend
        run: pnpm --filter backend run type-check

      - name: TypeScript — Frontend
        run: pnpm --filter frontend run type-check

      - name: Security — Endpoint Annotation Check
        # 모든 컨트롤러 엔드포인트에 @RequirePermissions/@SkipPermissions/@Public 보장
        run: pnpm security:check

      - name: Drizzle — Schema Drift Check
        # schema.ts ↔ drizzle/meta snapshot 동기화 검증.
        # 누군가 schema.ts만 고치고 `drizzle-kit generate`를 깜빡하면 여기서 잡힙니다.
        # 참고: docs/development/DRIZZLE_MIGRATIONS.md
        run: |
          pnpm --filter backend exec drizzle-kit generate --name __drift_check__ 2>&1 | tee /tmp/drizzle-gen.log
          if git status --porcelain apps/backend/drizzle/ | grep -qE '^(\?\?|\sM|M )'; then
            echo "::error::Schema drift detected. Run 'pnpm --filter backend run db:generate' locally and commit the result."
            git status apps/backend/drizzle/
            git diff apps/backend/drizzle/ | head -100
            exit 1
          fi

      # ─── 인프라 린터 (셸 스크립트, Dockerfile, Compose, healthcheck 테스트) ───

      - name: Install Infra Lint Tools
        # shellcheck: ubuntu-latest 기본 포함
        # hadolint: 바이너리 다운로드 (버전은 env.HADOLINT_VERSION)
        run: |
          curl -fsSL -o /usr/local/bin/hadolint \
            "https://github.com/hadolint/hadolint/releases/download/${{ env.HADOLINT_VERSION }}/hadolint-Linux-x86_64"
          chmod +x /usr/local/bin/hadolint

      - name: Infra — ShellCheck (셸 스크립트 정적 분석)
        run: |
          shellcheck --severity=warning \
            infra/scripts/*.sh \
            infra/healthchecks/*.sh

      - name: Infra — Hadolint (Dockerfile 린트)
        # .hadolint.yaml 설정 자동 참조
        run: |
          hadolint apps/backend/docker/Dockerfile
          hadolint apps/frontend/Dockerfile

      - name: Infra — dclint (Docker Compose 린트)
        # docker-compose.yml + infra/compose/ 하위 전수 검사
        run: npx --yes dclint docker-compose.yml infra/compose/ -r

      - name: Infra — Bats (healthcheck 단위 테스트)
        # infra/healthchecks/tests/*.bats 실행 — 헬스체크 스크립트 단위 검증
        run: npx --yes bats infra/healthchecks/tests/

      - name: Infra — Compose 보안 하드닝 검증
        # x-security anchor 동기화 + 서비스별 cap_drop/no-new-privileges 전수 검사
        run: bash infra/scripts/verify-compose-security.sh

      - name: Infra — SOPS Secret 복호화 검증
        # SOPS_AGE_KEY GitHub Actions secret 설정 후 활성화
        # 복호화 가능 여부만 확인 (값 노출 없음)
        if: ${{ secrets.SOPS_AGE_KEY != '' }}
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          curl -fsSL -o /usr/local/bin/sops \
            "https://github.com/getsops/sops/releases/download/${{ env.SOPS_VERSION }}/sops-${{ env.SOPS_VERSION }}.linux.amd64"
          chmod +x /usr/local/bin/sops
          sops decrypt --output-type dotenv infra/secrets/lan.env.sops.yaml > /dev/null
          echo "SOPS decrypt verification passed"

  # ─────────────────────────────────────────────
  # Gate 3a: 유닛 테스트 (quality-gate 후 병렬)
  # ─────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality-gate
    services:
      postgres:
        image: postgres:15.13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: equipment_management
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: turbo-cache
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          fail-on-cache-miss: true

      - name: Download Shared Package Dists
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: shared-packages-dist

      - name: Run DB Migrations
        run: pnpm --filter backend exec drizzle-kit push --force
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equipment_management

      - name: Run Unit Tests (with coverage)
        run: pnpm --filter backend run test:cov
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equipment_management
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          NODE_ENV: test
          PERMISSIONS_GUARD_MODE: DENY

      - name: Run Frontend Unit Tests
        run: pnpm --filter frontend run test -- --passWithNoTests
        env:
          NODE_ENV: test

      - name: Upload Coverage Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: coverage-report
          path: apps/backend/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Gate 3b: 빌드 검증 (quality-gate 후 병렬)
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: turbo-cache
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          fail-on-cache-miss: true

      - name: Build (turbo — 공유 패키지 → 백엔드 → 프론트엔드 순)
        run: pnpm build
        env:
          # Next.js 빌드 시 필요한 플레이스홀더 환경 변수
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3001
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

  # ─────────────────────────────────────────────
  # Gate 3c: 의존성 보안 감사 (quality-gate 후 병렬)
  # ─────────────────────────────────────────────
  dep-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          fail-on-cache-miss: true

      # --prod: 프로덕션 의존성만 검사 (devDependency 제외)
      # --audit-level=critical: CVSS 9+ (Critical)만 빌드 실패 처리
      # High 취약점은 pnpm.overrides로 관리, 즉시 패치 불가능한 간접 의존성 포함
      - name: pnpm Audit (prod only, critical)
        run: pnpm audit --prod --audit-level=critical

  # ─────────────────────────────────────────────
  # E2E 테스트는 별도 nightly workflow로 분리 (e2e-nightly.yml)
  # PR에서는 Lint + TypeScript + Unit Tests + Build만 실행하여 빠른 피드백 제공
  # ─────────────────────────────────────────────

  # ─────────────────────────────────────────────
  # Gate 4: Docker 이미지 빌드 (1회 빌드, 태그 재사용)
  # 3개 게이트 모두 통과 후, main push only
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [secret-scan, unit-test, build, dep-audit]
    # 실제 배포 시작 전까지는 workflow_dispatch로만 실행 (Docker Hub secrets 필요)
    # 배포 재개 시: 이 조건을 `github.ref == 'refs/heads/main' && github.event_name == 'push'`로 복구
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: apps/backend/docker/Dockerfile
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: apps/frontend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─────────────────────────────────────────────
  # Gate 4b: Docker 이미지 보안 스캔
  # ─────────────────────────────────────────────
  image-scan:
    name: Image Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Scan backend image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: '${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: '${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results (backend)
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always()
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'trivy-backend'

      - name: Upload Trivy results (frontend)
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always()
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'trivy-frontend'

  # ─────────────────────────────────────────────
  # Gate 5: 스테이징 배포 (이미지 태그 재지정만)
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy (Staging)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker-build, image-scan]
    environment:
      name: staging

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # 이미 빌드된 이미지에 staging 태그 추가 (재빌드 없음)
      - name: Tag images for staging
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:staging \
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:${{ github.sha }}
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:staging \
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:${{ github.sha }}

      - name: Deploy to staging server
        if: env.STAGING_DEPLOY_HOST != ''
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          STAGING_DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
        with:
          host: ${{ secrets.STAGING_DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/equipment-management-staging
            chmod +x ./scripts/deploy/deploy.sh
            DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }} ./scripts/deploy/deploy.sh ${{ github.sha }}

      - name: Staging smoke test
        if: env.STAGING_DEPLOY_HOST != ''
        env:
          STAGING_DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
        run: |
          BASE="https://${{ secrets.STAGING_DEPLOY_HOST }}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE/api/monitoring/health" 2>/dev/null) && \
            [ "$STATUS" = "200" ] && echo "Health check passed" && exit 0
            echo "Attempt $i failed (status=${STATUS:-timeout}), retrying in 15s..."
            sleep 15
          done
          echo "Staging smoke test failed after 5 attempts"
          exit 1

  # ─────────────────────────────────────────────
  # Gate 6: 프로덕션 배포 (이미지 태그 재지정만)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: deploy-staging
    environment:
      name: production

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # 이미 빌드된 이미지에 production 태그 추가 (재빌드 없음)
      - name: Tag images for production
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:latest \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:${{ github.sha }} \
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:${{ github.sha }}
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:latest \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:${{ github.sha }} \
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:${{ github.sha }}

      - name: Deploy to production server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/equipment-management
            chmod +x ./scripts/deploy/deploy.sh
            DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }} ./scripts/deploy/deploy.sh ${{ github.sha }}

      - name: Create Grafana deploy annotation
        if: success() && env.GRAFANA_URL != ''
        continue-on-error: true
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
        run: |
          curl -sf -X POST "${{ secrets.GRAFANA_URL }}/api/annotations" \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Deploy: ${{ github.sha }}\",\"tags\":[\"deployment\"]}"

      - name: Send deployment notification
        if: always()
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: deployments
          SLACK_TITLE: ${{ job.status == 'success' && 'Deployment Completed ✅' || 'Deployment Failed ❌' }}
          SLACK_MESSAGE: |
            Equipment Management System
            Branch: ${{ github.ref_name }}
            SHA: ${{ github.sha }}
            Status: ${{ job.status }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
