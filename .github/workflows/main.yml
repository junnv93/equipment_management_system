name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 같은 브랜치에 새 push가 오면 이전 실행 취소 (PR 피드백 속도 향상)
# main push는 취소하지 않음 — 배포 중단 방지
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ─────────────────────────────────────────────
  # Gate 1: 시크릿 스캔 (~30s, 독립 실행)
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # Gate 2: 품질 게이트 (~3-5min, DB 불필요)
  # Lint + TypeScript + 엔드포인트 어노테이션 검증
  # ─────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # Turbo + node_modules 캐시
      - uses: actions/cache@v4
        id: turbo-cache
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-

      - uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint — Backend (CI mode, no auto-fix)
        run: pnpm --filter backend run lint:ci

      - name: Lint — Frontend
        run: pnpm --filter frontend run lint

      - name: TypeScript — Backend
        run: pnpm --filter backend run type-check

      - name: TypeScript — Frontend
        run: pnpm --filter frontend run type-check

      - name: Security — Endpoint Annotation Check
        # 모든 컨트롤러 엔드포인트에 @RequirePermissions/@SkipPermissions/@Public 보장
        run: pnpm security:check

  # ─────────────────────────────────────────────
  # Gate 3a: 유닛 테스트 (quality-gate 후 병렬)
  # ─────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality-gate
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: equipment_management
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build Shared Packages
        run: pnpm build --filter "@equipment-management/*"

      - name: Run DB Migrations
        run: pnpm --filter backend run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equipment_management

      - name: Run Unit Tests (with coverage)
        run: pnpm --filter backend run test:cov
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equipment_management
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-jwt-secret-do-not-use-in-production' }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET || 'ci-refresh-secret-do-not-use-in-production' }}
          NODE_ENV: test
          PERMISSIONS_GUARD_MODE: DENY

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/backend/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Gate 3b: 빌드 검증 (quality-gate 후 병렬)
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build (turbo — 공유 패키지 → 백엔드 → 프론트엔드 순)
        run: pnpm build
        env:
          # Next.js 빌드 시 필요한 플레이스홀더 환경 변수
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-nextauth-placeholder-32chars-min' }}
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3001
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

  # ─────────────────────────────────────────────
  # Gate 3c: 의존성 보안 감사 (quality-gate 후 병렬)
  # ─────────────────────────────────────────────
  dep-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # --prod: 프로덕션 의존성만 검사 (devDependency 제외)
      # --audit-level=high: CVSS 7+ (High/Critical)만 빌드 실패 처리
      - name: pnpm Audit (prod only, high+critical)
        run: pnpm audit --prod --audit-level=high

  # ─────────────────────────────────────────────
  # Gate 3d: E2E 테스트 (quality-gate 후 병렬)
  # PR과 main push 모두에서 실행
  # ─────────────────────────────────────────────
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: quality-gate
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: equipment_management
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build Shared Packages
        run: pnpm build --filter "@equipment-management/*"

      - name: Run DB Migrations & Seed
        run: pnpm --filter backend run db:migrate && pnpm --filter backend run db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equipment_management

      - name: Install Playwright Browsers (chromium only)
        run: pnpm --filter frontend exec playwright install --with-deps chromium

      - name: Start Backend (background)
        run: pnpm --filter backend run start:prod &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equipment_management
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-jwt-secret-do-not-use-in-production' }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET || 'ci-refresh-secret-do-not-use-in-production' }}
          NODE_ENV: test
          PERMISSIONS_GUARD_MODE: DENY
          PORT: 3001

      - name: Build & Start Frontend (background)
        run: |
          pnpm --filter frontend run build
          pnpm --filter frontend run start &
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-nextauth-placeholder-32chars-min' }}
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/monitoring/health > /dev/null 2>&1 && break
            sleep 2
          done
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && break
            sleep 2
          done
          echo "Services ready"

      - name: Run E2E Tests (chromium only)
        run: pnpm --filter frontend exec playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Gate 4: Docker 이미지 빌드 (1회 빌드, 태그 재사용)
  # 3개 게이트 모두 통과 후, main push only
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit-test, build, dep-audit, e2e-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/docker/Dockerfile
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─────────────────────────────────────────────
  # Gate 4b: Docker 이미지 보안 스캔
  # ─────────────────────────────────────────────
  image-scan:
    name: Image Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy results (backend)
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'trivy-backend'

      - name: Upload Trivy results (frontend)
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'trivy-frontend'

  # ─────────────────────────────────────────────
  # Gate 5: 스테이징 배포 (이미지 태그 재지정만)
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy (Staging)
    runs-on: ubuntu-latest
    needs: [docker-build, image-scan]
    environment:
      name: staging

    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # 이미 빌드된 이미지에 staging 태그 추가 (재빌드 없음)
      - name: Tag images for staging
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:staging \
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:${{ github.sha }}
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:staging \
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:${{ github.sha }}

      - name: Deploy to staging server
        if: ${{ secrets.STAGING_DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.STAGING_DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/equipment-management-staging
            chmod +x ./scripts/deploy/deploy.sh
            DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }} ./scripts/deploy/deploy.sh ${{ github.sha }}

      - name: Staging smoke test
        if: ${{ secrets.STAGING_DEPLOY_HOST != '' }}
        run: |
          BASE="https://${{ secrets.STAGING_DEPLOY_HOST }}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE/api/monitoring/health" 2>/dev/null) && \
            [ "$STATUS" = "200" ] && echo "Health check passed" && exit 0
            echo "Attempt $i failed (status=${STATUS:-timeout}), retrying in 15s..."
            sleep 15
          done
          echo "Staging smoke test failed after 5 attempts"
          exit 1

  # ─────────────────────────────────────────────
  # Gate 6: 프로덕션 배포 (이미지 태그 재지정만)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production

    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # 이미 빌드된 이미지에 production 태그 추가 (재빌드 없음)
      - name: Tag images for production
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:latest \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:${{ github.sha }} \
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-backend:${{ github.sha }}
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:latest \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:${{ github.sha }} \
            ${{ secrets.DOCKER_HUB_USERNAME }}/equipment-management-frontend:${{ github.sha }}

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/equipment-management
            chmod +x ./scripts/deploy/deploy.sh
            DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }} ./scripts/deploy/deploy.sh ${{ github.sha }}

      - name: Create Grafana deploy annotation
        if: success() && secrets.GRAFANA_URL != ''
        continue-on-error: true
        run: |
          curl -sf -X POST "${{ secrets.GRAFANA_URL }}/api/annotations" \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Deploy: ${{ github.sha }}\",\"tags\":[\"deployment\"]}"

      - name: Send deployment notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: deployments
          SLACK_TITLE: ${{ job.status == 'success' && 'Deployment Completed ✅' || 'Deployment Failed ❌' }}
          SLACK_MESSAGE: |
            Equipment Management System
            Branch: ${{ github.ref_name }}
            SHA: ${{ github.sha }}
            Status: ${{ job.status }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
