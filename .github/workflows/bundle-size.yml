name: Bundle Size Check
# 임계값 SSOT: docs/operations/performance-budgets.md
# 도구: Next.js build 출력 파싱 + scripts/check-bundle-size.mjs

on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - 'packages/**'
      - 'scripts/check-bundle-size.mjs'
      - '.github/workflows/bundle-size.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  bundle:
    name: Bundle Size (First Load JS < 250 kB)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@a7487ba4b53252b86d2b92fa9c797d928c33c48f # v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (with bundle analyzer)
        run: |
          pnpm --filter frontend run build 2>&1 | tee /tmp/next-build.txt
          echo "--- build output preview ---"
          grep -E "kB|Route|First Load" /tmp/next-build.txt | head -40 || true
        env:
          ANALYZE: 'true'
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-bundle-secret-not-for-production
          API_URL: http://localhost:3001
          NEXT_PUBLIC_API_URL: http://localhost:3001
          ENABLE_LOCAL_AUTH: 'true'

      - name: Check bundle size thresholds
        run: node scripts/check-bundle-size.mjs < /tmp/next-build.txt

      - name: Upload bundle analyzer report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analyzer-${{ github.run_id }}
          # @next/bundle-analyzer가 .next/analyze/ 에 생성
          path: apps/frontend/.next/analyze/
          retention-days: 14
          if-no-files-found: warn
