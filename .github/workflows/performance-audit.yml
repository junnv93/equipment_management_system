name: Performance Audit (Lighthouse CI)
# 임계값 SSOT: docs/operations/performance-budgets.md
# 대상: /login (인증 불필요 — 백엔드 없이 실행)

on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - '.lighthouserc.js'
      - '.github/workflows/performance-audit.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  lighthouse:
    name: Lighthouse CI — /login
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@a7487ba4b53252b86d2b92fa9c797d928c33c48f # v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter frontend run build
        env:
          # /login 페이지는 backend 호출 없음 — CI 전용 더미값
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-lighthouse-secret-not-for-production
          API_URL: http://localhost:3001
          NEXT_PUBLIC_API_URL: http://localhost:3001
          ENABLE_LOCAL_AUTH: 'true'

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.js
          uploadArtifacts: true
          temporaryPublicStorage: false
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-lighthouse-secret-not-for-production
          API_URL: http://localhost:3001
          NEXT_PUBLIC_API_URL: http://localhost:3001
          ENABLE_LOCAL_AUTH: 'true'

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-${{ github.run_id }}
          path: .lighthouseci/
          retention-days: 14
