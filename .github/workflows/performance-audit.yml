name: Performance Audit (Lighthouse CI)
# 임계값 SSOT: docs/operations/performance-budgets.md
# 대상: /login (인증 불필요 — 백엔드 없이 실행)

on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - '.lighthouserc.js'
      - '.github/workflows/performance-audit.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  lighthouse:
    name: Lighthouse CI — /login
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter frontend run build
        env:
          # /login 페이지는 backend 호출 없음 — CI 전용 더미값
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-lighthouse-secret-not-for-production
          INTERNAL_BACKEND_URL: http://localhost:3001
          ENABLE_LOCAL_AUTH: 'true'

      - name: Install Lighthouse CI CLI
        # treosh/lighthouse-ci-action@v12은 저장소 액션 허용 목록 밖 — @lhci/cli npm 직접 실행으로 대체
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        # lhci autorun은 .lighthouserc.js의 startServerCommand로 Next.js 서버를 직접 기동
        run: lhci autorun
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-lighthouse-secret-not-for-production
          INTERNAL_BACKEND_URL: http://localhost:3001
          ENABLE_LOCAL_AUTH: 'true'

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-${{ github.run_id }}
          path: .lighthouseci/
          retention-days: 14
