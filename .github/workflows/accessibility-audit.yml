name: Accessibility Audit (Public Routes)
# 임계값 SSOT: docs/operations/performance-budgets.md
# 대상 라우트 SSOT: docs/operations/quality-audit-routes.json
# 도구: @axe-core/playwright (기존 설치됨)
# 대상: publicRoutes 중 a11y=true (인증 불필요 — 백엔드 없이 실행)

on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - 'docs/operations/quality-audit-routes.json'
      - '.github/workflows/accessibility-audit.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  axe:
    name: axe-core WCAG 2.1 AA — public routes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter frontend exec playwright install chromium --with-deps

      - name: Build frontend
        run: pnpm --filter frontend run build
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-a11y-secret-not-for-production
          INTERNAL_BACKEND_URL: http://localhost:3001
          ENABLE_LOCAL_AUTH: 'true'

      - name: Start frontend server
        run: pnpm --filter frontend run start &
        env:
          PORT: 3000
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-a11y-secret-not-for-production
          INTERNAL_BACKEND_URL: http://localhost:3001
          ENABLE_LOCAL_AUTH: 'true'

      - name: Wait for server ready
        run: |
          READY_PATH="$(node -p "require('./docs/operations/quality-audit-routes.json').publicRoutes.find((route) => route.a11y)?.path || '/'")"
          timeout 30 bash -c \
            "until curl -sf http://localhost:3000${READY_PATH} -o /dev/null; do sleep 1; done" \
          && echo "✅ 서버 준비 완료"

      - name: Run axe accessibility tests
        run: |
          pnpm --filter frontend exec playwright test \
            --config playwright.a11y.config.ts \
            --reporter=list
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: a11y-report-${{ github.run_id }}
          path: apps/frontend/playwright-report-a11y/
          retention-days: 14
